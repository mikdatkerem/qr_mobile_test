name: qr_location_app
description: QR tabanlı konum gösterme uygulaması

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  mobile_scanner: ^5.0.0
  flutter_svg: ^2.0.10+1
  http: ^1.2.0
  signalr_netcore: ^1.3.5
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/kroki.svg
    - assets/mustang.jpeg